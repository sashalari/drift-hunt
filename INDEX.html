<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIFT HUNT — 3D Arcade Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
            background: #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0f0;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #0f0;
            z-index: 10;
        }
        #speed {
            font-size: 32px;
            margin-top: 10px;
        }
        #speedometer {
            margin-top: 15px;
            width: 150px;
            height: 40px;
            background: #1a1a1f;
            border: 2px solid #0f0;
            border-radius: 5px;
            overflow: hidden;
        }
        #speedBar {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff6600, #ff0000);
            width: 0%;
            transition: width 0.1s;
        }
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
            color: #0f0;
            text-align: center;
        }
        #menu h1 {
            font-size: 80px;
            text-shadow: 0 0 20px #f0f;
            color: #f0f;
        }
        #menu p {
            font-size: 24px;
        }
        #menu button {
            padding: 20px 40px;
            font-size: 24px;
            background: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        #menu button:hover {
            background: #00cc00;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 100;
        }
        #carSelectScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 100;
            color: #0f0;
            text-align: center;
            overflow-y: auto;
        }
        #carSelectScreen h1 {
            font-size: 60px;
            color: #f0f;
            text-shadow: 0 0 20px #f0f;
            margin-top: 30px;
        }
        .car-models {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
        }
        .car-model {
            background: #1a1a1f;
            border: 3px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            width: 200px;
            transition: all 0.3s;
        }
        .car-model:hover {
            border-color: #00ff00;
            box-shadow: 0 0 20px #00ff00;
            transform: scale(1.05);
        }
        .car-model.selected {
            border-color: #f0f;
            box-shadow: 0 0 30px #f0f;
            background: #2a1a2f;
        }
        .car-model h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #f0f;
        }
        .car-model p {
            font-size: 14px;
            color: #0f0;
            margin-bottom: 15px;
        }
        .color-options {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-btn:hover {
            border-color: #00ff00;
            transform: scale(1.1);
        }
        .color-btn.selected {
            border-color: #ffff00;
            box-shadow: 0 0 10px #ffff00;
        }
        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            margin-bottom: 30px;
        }
        .button-group button {
            padding: 15px 30px;
            font-size: 20px;
            background: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .button-group button:hover {
            background: #00cc00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>DRIFT HUNT</h1>
        <p>🏁 Аркадная гонка от первого лица</p>
        <p>Управление: ← → стрелки | Shift - дрифт | E - Нитро</p>
        <button onclick="showCarSelect()">НАЧАТЬ</button>
    </div>
    <canvas id="canvas"></canvas>
    <div id="hud" style="display: none;">
        <div>Очки: <span id="score">0</span></div>
        <div id="speed">Скорость: 0 км/ч</div>
        <div id="speedometer">
            <div id="speedBar"></div>
        </div>
        <div id="driftCounter" style="margin-top: 15px; color: #ff00ff; font-size: 20px; text-shadow: 0 0 10px #ff00ff; display: none;">
            🔥 DRIFT: <span id="driftText">0</span>
        </div>
    </div>
    <canvas id="wheelCanvas" style="position: absolute; bottom: 20px; right: 20px; width: 120px; height: 120px; display: none;"></canvas>
    <div id="mirror" style="position: absolute; top: 20px; right: 20px; width: 150px; height: 100px; border: 3px solid #00ff00; background: #000; display: none; overflow: hidden;">
        <canvas id="mirrorCanvas" style="width: 100%; height: 100%;"></canvas>
    </div>
    <div id="gameOverScreen">
        <h1 style="color: #ff0000; font-size: 80px; text-shadow: 0 0 20px #ff0000;">GAME OVER</h1>
        <div style="color: #ffff00; font-size: 36px;">Очки: <span id="finalScore">0</span></div>
        <button onclick="location.reload()" style="padding: 20px 40px; font-size: 24px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;">ЗАНОВО</button>
    </div>

    <div id="carSelectScreen">
        <h1>🏎️ ВЫБЕРИ СВОЮ МАШИНУ</h1>
        <p style="font-size: 18px; color: #00ff00; margin-bottom: 30px;">Выбери модель и цвет</p>
        <div class="car-models" id="carModels"></div>
        <div class="button-group">
            <button onclick="showMenu()">← НАЗАД</button>
            <button onclick="startGameWithCar()" id="startBtn" disabled>ПОЕХАЛИ →</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // === ПЕРЕМЕННЫЕ ===
        let scene, camera, renderer;
        let playerCar, road, roadSegments = [];
        let inputHandler = {};
        let gameState = 'menu';
        let score = 0;
        const MAX_SPEED = 200;
        let enemies = [], spawnCounter = 0;
        let nitroActive = false, nitroTimer = 0, nitroCooldown = 0;
        let smokeParticles = [];

        // === ЗВУКИ (Web Audio API) ===
        let audioContext = null;
        let engineOscillator = null;
        let engineGain = null;
        let driftOscillator = null;
        let driftGain = null;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playEngineSound(speed) {
            if (!audioContext) return;
            if (!engineGain) {
                engineGain = audioContext.createGain();
                engineGain.connect(audioContext.destination);
                engineGain.gain.value = 0.1;

                engineOscillator = audioContext.createOscillator();
                engineOscillator.type = 'triangle';
                engineOscillator.frequency.value = 200 + (speed / MAX_SPEED) * 400;
                engineOscillator.connect(engineGain);
                engineOscillator.start();
            }

            engineOscillator.frequency.linearRampToValueAtTime(
                200 + (speed / MAX_SPEED) * 400,
                audioContext.currentTime + 0.05
            );
        }

        function stopEngineSound() {
            if (engineOscillator) {
                engineOscillator.stop();
                engineOscillator = null;
                engineGain = null;
            }
        }

        function playDriftSound() {
            if (!audioContext) return;
            if (driftOscillator) return;

            driftGain = audioContext.createGain();
            driftGain.connect(audioContext.destination);
            driftGain.gain.value = 0.05;

            driftOscillator = audioContext.createOscillator();
            driftOscillator.type = 'sawtooth';
            driftOscillator.frequency.value = 150;
            driftOscillator.connect(driftGain);
            driftOscillator.start();

            driftGain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.5);
            driftOscillator.stop(audioContext.currentTime + 0.5);
            driftOscillator = null;
        }

        // Сирена полиции
        let sirenOscillator = null;
        function playSirenSound() {
            if (!audioContext || sirenOscillator) return;

            const sirenGain = audioContext.createGain();
            sirenGain.connect(audioContext.destination);
            sirenGain.gain.value = 0.08;

            sirenOscillator = audioContext.createOscillator();
            sirenOscillator.type = 'sine';

            // У-ВУ-У-ВУ звук (чередование частот)
            const now = audioContext.currentTime;
            sirenOscillator.frequency.setValueAtTime(400, now);
            sirenOscillator.frequency.linearRampToValueAtTime(600, now + 0.3);
            sirenOscillator.frequency.linearRampToValueAtTime(400, now + 0.6);
            sirenOscillator.frequency.linearRampToValueAtTime(300, now + 0.9);
            sirenOscillator.frequency.linearRampToValueAtTime(400, now + 1.2);

            sirenOscillator.connect(sirenGain);
            sirenOscillator.start();
            sirenOscillator.stop(now + 1.2);
            sirenOscillator = null;
        }

        // Звук столкновения
        function playCollisionSound() {
            if (!audioContext) return;

            const collisionGain = audioContext.createGain();
            collisionGain.connect(audioContext.destination);
            collisionGain.gain.value = 0.15;

            const collisionOsc = audioContext.createOscillator();
            collisionOsc.type = 'sawtooth';
            const now = audioContext.currentTime;

            collisionOsc.frequency.setValueAtTime(300, now);
            collisionOsc.frequency.linearRampToValueAtTime(100, now + 0.3);

            collisionOsc.connect(collisionGain);
            collisionOsc.start();
            collisionGain.gain.linearRampToValueAtTime(0, now + 0.3);
            collisionOsc.stop(now + 0.3);
        }

        // === ВЫБОР МАШИН ===
        let selectedCarModel = 'bmw';
        let selectedCarColor = 0xff0000;

        // === РЕЙТИНГ ДРИФТОВ ===
        let driftScore = 0;
        let driftTimer = 0;
        let driftCombo = 0;

        const CAR_MODELS = {
            bmw: { name: '🏎️ BMW M4', colors: [0xff0000, 0x0000ff, 0x000000, 0xffffff] },
            audi: { name: '🏎️ Audi RS6', colors: [0xff6b00, 0x00ff00, 0x1a1a2e, 0xff00ff] },
            mercedes: { name: '🏎️ Mercedes AMG', colors: [0xd4af37, 0x000000, 0xffffff, 0xff1493] },
            jeep: { name: '🚙 Jeep Wrangler', colors: [0x228b22, 0xffaa00, 0x8b4513, 0x4169e1] }
        };

        // === ИНИЦИАЛИЗАЦИЯ ===
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0xD4B896, 400, 5000); // Тёплый бежевый цвет для дали
            scene.background = new THREE.Color(0xDEB887); // Тёплое бежевое небо

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 1.5, 0);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;

            // Свет
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(100, 200, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 4096;
            sunLight.shadow.mapSize.height = 4096;
            sunLight.shadow.camera.far = 1000;
            scene.add(sunLight);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // === ГОРЫ ПО БОКАМ ===
            createMountains();

            // === ОБЛАКА (розово-оранжевые) ===
            const cloudMat = new THREE.MeshStandardMaterial({
                color: 0xFF9966, // Розово-оранжевый
                roughness: 0.8,
                flatShading: true,
                emissive: 0xFF8855 // Мягкое свечение
            });

            for (let i = 0; i < 20; i++) {
                const cloudGeom = new THREE.SphereGeometry(40 + Math.random() * 30, 4, 4);
                const cloud = new THREE.Mesh(cloudGeom, cloudMat);
                cloud.position.set(
                    (Math.random() - 0.5) * 800,
                    220 + Math.random() * 280,
                    -1500 + i * 300
                );
                scene.add(cloud);
            }

            // Небо с ТЁПЛЫМ градиентом
            const skyGeometry = new THREE.SphereGeometry(2000, 32, 32);
            const skyCanvas = document.createElement('canvas');
            skyCanvas.width = 256;
            skyCanvas.height = 256;
            const skyCtx = skyCanvas.getContext('2d');
            const skyGradient = skyCtx.createLinearGradient(0, 0, 0, 256);
            // Тёплый градиент: от светлого верхнего края к более жёлтому
            skyGradient.addColorStop(0, '#E8D4B0');   // Верх: светлый бежевый
            skyGradient.addColorStop(0.5, '#F0D9B5'); // Средина
            skyGradient.addColorStop(1, '#FFD9A8');   // Низ: тёплый жёлто-оранжевый
            skyCtx.fillStyle = skyGradient;
            skyCtx.fillRect(0, 0, 256, 256);
            const skyTexture = new THREE.CanvasTexture(skyCanvas);
            const skyMaterial = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide });
            const sky = new THREE.Mesh(skyGeometry, skyMaterial);
            scene.add(sky);
        }

        // === СОЗДАНИЕ ДЕРЕВЬЕВ И ГОР ===
        function createMountains() {
            // Функция для создания одного дерева
            function createTree(x, z, scale = 1) {
                const group = new THREE.Group();

                // СТВОЛ (коричневый)
                const trunkMat = new THREE.MeshStandardMaterial({
                    color: 0x8B5A2B, // Коричневый
                    roughness: 0.8,
                    flatShading: true
                });
                const trunkGeom = new THREE.CylinderGeometry(0.4 * scale, 0.5 * scale, 6 * scale, 4);
                const trunk = new THREE.Mesh(trunkGeom, trunkMat);
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                group.add(trunk);

                // ЛИСТЬЯ (зелёная пирамида - верх)
                const foliageMat = new THREE.MeshStandardMaterial({
                    color: 0x228B22, // Лесная зелень
                    roughness: 0.6,
                    flatShading: true
                });
                const foliageGeom = new THREE.ConeGeometry(2 * scale, 6 * scale, 4);
                const foliage = new THREE.Mesh(foliageGeom, foliageMat);
                foliage.position.y = 3 * scale;
                foliage.castShadow = true;
                foliage.receiveShadow = true;
                group.add(foliage);

                // ЛИСТЬЯ (второй слой - ярче)
                const foliage2Mat = new THREE.MeshStandardMaterial({
                    color: 0x32CD32, // Яркая зелень
                    roughness: 0.6,
                    flatShading: true
                });
                const foliage2Geom = new THREE.ConeGeometry(1.5 * scale, 5 * scale, 4);
                const foliage2 = new THREE.Mesh(foliage2Geom, foliage2Mat);
                foliage2.position.y = 2.5 * scale;
                foliage2.castShadow = true;
                foliage2.receiveShadow = true;
                group.add(foliage2);

                group.position.set(x, 0, z);
                return group;
            }

            // === ДЕРЕВЬЯ ПО ЛЕВОЙ СТОРОНЕ ДОРОГИ ===
            for (let i = 0; i < 25; i++) {
                const tree = createTree(-13 - Math.random() * 3, -i * 40, 0.8 + Math.random() * 0.4);
                scene.add(tree);
            }

            // === ДЕРЕВЬЯ ПО ПРАВОЙ СТОРОНЕ ДОРОГИ ===
            for (let i = 0; i < 25; i++) {
                const tree = createTree(13 + Math.random() * 3, -i * 40, 0.8 + Math.random() * 0.4);
                scene.add(tree);
            }

            // === ГОРЫ ВДАЛИ (на горизонте) ===
            const mountainMat = new THREE.MeshStandardMaterial({
                color: 0xF5F5F5, // Белые/снежные
                roughness: 0.5,
                flatShading: true
            });

            // Горы вдали слева
            for (let i = 0; i < 5; i++) {
                const peakGeom = new THREE.ConeGeometry(150 + i * 50, 300 + i * 100, 4);
                const peak = new THREE.Mesh(peakGeom, mountainMat);
                peak.position.set(-300 - i * 150, 100, -2000 - i * 300);
                peak.castShadow = true;
                peak.receiveShadow = true;
                scene.add(peak);
            }

            // Горы вдали справа
            for (let i = 0; i < 5; i++) {
                const peakGeom = new THREE.ConeGeometry(150 + i * 50, 300 + i * 100, 4);
                const peak = new THREE.Mesh(peakGeom, mountainMat);
                peak.position.set(300 + i * 150, 100, -2000 - i * 300);
                peak.castShadow = true;
                peak.receiveShadow = true;
                scene.add(peak);
            }
        }

        // === ФУНКЦИЯ КРИВОЙ ДОРОГИ ===
        // S-образные повороты + волны для интересного геймплея
        function getRoadOffset(z) {
            // Комбинация кривых для S-поворотов
            const sin1 = Math.sin(z / 200) * 8;      // Медленный поворот влево
            const sin2 = Math.sin(z / 150) * 6;      // Средний поворот вправо
            const wave = Math.sin(z / 300) * 4;      // Волны
            const tight = Math.cos(z / 100) * 3;     // Плотные повороты

            return sin1 + sin2 + wave + tight;
        }

        // === СОЗДАНИЕ LOW POLY МАШИНЫ ===
        function createRealisticCar(color, isEnemy = false, model = 'bmw') {
            const group = new THREE.Group();

            // Разные размеры для разных моделей
            let bodyWidth = 1.5, bodyHeight = 1.0, bodyLength = 2.8;
            if (model === 'jeep') {
                bodyWidth = 1.6;
                bodyHeight = 1.2;
                bodyLength = 2.5;
            } else if (model === 'mercedes') {
                bodyWidth = 1.4;
                bodyHeight = 0.95;
                bodyLength = 3.0;
            } else if (model === 'audi') {
                bodyWidth = 1.45;
                bodyHeight = 1.0;
                bodyLength = 2.9;
            }

            // Корпус LOW POLY
            const bodyGeom = new THREE.BoxGeometry(bodyWidth, bodyHeight, bodyLength);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: color,
                metalness: 0.3,
                roughness: 0.7,
                flatShading: true // LOW POLY эффект
            });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            // Капот (масштабируется с корпусом)
            const hoodGeom = new THREE.BoxGeometry(bodyWidth - 0.1, 0.4, bodyLength * 0.32);
            const hood = new THREE.Mesh(hoodGeom, bodyMat);
            hood.position.set(0, -0.2, bodyLength / 2 - 0.3);
            hood.castShadow = true;
            hood.receiveShadow = true;
            group.add(hood);

            // Крыша (масштабируется с корпусом)
            const roofGeom = new THREE.BoxGeometry(bodyWidth - 0.2, 0.5, bodyLength * 0.45);
            const roof = new THREE.Mesh(roofGeom, bodyMat);
            roof.position.y = bodyHeight / 2 + 0.1;
            roof.position.z = -0.2;
            roof.castShadow = true;
            roof.receiveShadow = true;
            group.add(roof);

            // ВИДИМЫЙ КАПОТ СПЕРЕДИ (для first-person view)
            const visibleHoodGeom = new THREE.BoxGeometry(bodyWidth - 0.3, 0.3, 0.8);
            const visibleHood = new THREE.Mesh(visibleHoodGeom, bodyMat);
            visibleHood.position.set(0, -0.5, 1.1); // Видно спереди внизу экрана
            visibleHood.castShadow = true;
            visibleHood.receiveShadow = true;
            group.add(visibleHood);

            // Окна
            const windowGeom = new THREE.BoxGeometry(1.2, 0.6, 0.15);
            const windowMat = new THREE.MeshStandardMaterial({
                color: 0x87CEEB,
                metalness: 0.2,
                roughness: 0.3,
                transparent: true,
                opacity: 0.6,
                flatShading: true
            });
            const frontWindow = new THREE.Mesh(windowGeom, windowMat);
            frontWindow.position.set(0, 0.3, 1.3);
            frontWindow.receiveShadow = true;
            group.add(frontWindow);

            const rearWindow = new THREE.Mesh(windowGeom, windowMat);
            rearWindow.position.set(0, 0.3, -1.1);
            rearWindow.receiveShadow = true;
            group.add(rearWindow);

            // Фары - яркие кубики
            const headlightGeom = new THREE.BoxGeometry(0.2, 0.2, 0.1);
            const headlightMat = new THREE.MeshStandardMaterial({
                color: 0xFFFF00,
                emissive: 0xFFFF00,
                flatShading: true
            });
            const leftHeadlight = new THREE.Mesh(headlightGeom, headlightMat);
            leftHeadlight.position.set(-0.5, 0.2, 1.5);
            group.add(leftHeadlight);

            const rightHeadlight = new THREE.Mesh(headlightGeom, headlightMat);
            rightHeadlight.position.set(0.5, 0.2, 1.5);
            group.add(rightHeadlight);

            // Задние фонари
            const tailLightMat = new THREE.MeshStandardMaterial({
                color: 0xFF0000,
                emissive: 0xFF0000,
                flatShading: true
            });
            const leftTailLight = new THREE.Mesh(headlightGeom, tailLightMat);
            leftTailLight.position.set(-0.5, 0.2, -1.5);
            group.add(leftTailLight);

            const rightTailLight = new THREE.Mesh(headlightGeom, tailLightMat);
            rightTailLight.position.set(0.5, 0.2, -1.5);
            group.add(rightTailLight);

            // Номерной знак
            const plateGeom = new THREE.BoxGeometry(0.8, 0.25, 0.05);
            const plateMat = new THREE.MeshStandardMaterial({
                color: 0xFFFFFF,
                flatShading: true
            });
            const licensePlate = new THREE.Mesh(plateGeom, plateMat);
            licensePlate.position.set(0, -0.45, -1.6);
            group.add(licensePlate);

            // КОЛЁСА (4 чёрных цилиндра)
            const wheelMat = new THREE.MeshStandardMaterial({
                color: 0x111111,
                roughness: 0.9,
                metalness: 0.2,
                flatShading: true
            });
            const wheelGeom = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 8);

            // Передние колёса
            const frontLeftWheel = new THREE.Mesh(wheelGeom, wheelMat);
            frontLeftWheel.rotation.z = Math.PI / 2;
            frontLeftWheel.position.set(-bodyWidth / 2 + 0.2, -0.4, bodyLength / 3);
            frontLeftWheel.castShadow = true;
            frontLeftWheel.receiveShadow = true;
            group.add(frontLeftWheel);

            const frontRightWheel = new THREE.Mesh(wheelGeom, wheelMat);
            frontRightWheel.rotation.z = Math.PI / 2;
            frontRightWheel.position.set(bodyWidth / 2 - 0.2, -0.4, bodyLength / 3);
            frontRightWheel.castShadow = true;
            frontRightWheel.receiveShadow = true;
            group.add(frontRightWheel);

            // Задние колёса
            const backLeftWheel = new THREE.Mesh(wheelGeom, wheelMat);
            backLeftWheel.rotation.z = Math.PI / 2;
            backLeftWheel.position.set(-bodyWidth / 2 + 0.2, -0.4, -bodyLength / 3);
            backLeftWheel.castShadow = true;
            backLeftWheel.receiveShadow = true;
            group.add(backLeftWheel);

            const backRightWheel = new THREE.Mesh(wheelGeom, wheelMat);
            backRightWheel.rotation.z = Math.PI / 2;
            backRightWheel.position.set(bodyWidth / 2 - 0.2, -0.4, -bodyLength / 3);
            backRightWheel.castShadow = true;
            backRightWheel.receiveShadow = true;
            group.add(backRightWheel);

            return group;
        }

        // === КЛАСС МАШИНЫ ИГРОКА ===
        class PlayerCar {
            constructor() {
                this.x = 0;
                this.z = 0;
                this.angle = 0;
                this.velocity = 0;
                this.maxSpeed = MAX_SPEED;
                this.isDrifting = false;
                this.roadWidth = 10;
                this.velocityX = 0;
                this.lastDriftPlay = 0;

                this.mesh = createRealisticCar(selectedCarColor, false, selectedCarModel);
                scene.add(this.mesh);
            }

            update(deltaTime) {
                let steering = 0;
                if (inputHandler['ArrowLeft']) steering = 1;
                if (inputHandler['ArrowRight']) steering = -1;

                if (inputHandler['Shift']) {
                    this.isDrifting = true;
                    if (Date.now() - this.lastDriftPlay > 200) {
                        playDriftSound();
                        this.lastDriftPlay = Date.now();
                    }
                    driftTimer += deltaTime;
                    document.getElementById('driftCounter').style.display = 'block';
                } else {
                    if (this.isDrifting && driftTimer > 0.5) {
                        // Бонус за длинный дрифт
                        driftScore += Math.floor(driftTimer * 100);
                        score += Math.floor(driftTimer * 100);
                    }
                    this.isDrifting = false;
                    driftTimer = 0;
                    document.getElementById('driftCounter').style.display = 'none';
                }

                // Нитро
                if (inputHandler['e'] || inputHandler['E']) {
                    if (nitroCooldown <= 0 && !nitroActive) {
                        nitroActive = true;
                        nitroTimer = 3;
                        nitroCooldown = 5;
                    }
                }

                if (nitroActive) {
                    nitroTimer -= deltaTime;
                    if (nitroTimer <= 0) nitroActive = false;
                }

                if (nitroCooldown > 0) nitroCooldown -= deltaTime;

                let acceleration = 50;
                if (nitroActive) acceleration = 150;

                if (this.velocity < this.maxSpeed) {
                    this.velocity += acceleration * deltaTime;
                } else {
                    this.velocity -= 10 * deltaTime;
                }

                // Звук двигателя
                if (gameState === 'playing') {
                    playEngineSound(this.velocity);
                }

                // Управление с инерцией
                if (this.isDrifting) {
                    this.angle += steering * 1.5 * deltaTime;
                } else {
                    this.angle += steering * 0.8 * deltaTime;
                }

                // Плавное движение с инерцией
                const targetX = Math.sin(this.angle) * this.velocity * 0.5 * deltaTime;
                this.velocityX += (targetX - this.velocityX) * 0.3;
                this.x += this.velocityX;

                const roadHalfWidth = this.roadWidth / 2;
                if (this.x < -roadHalfWidth) {
                    this.x = -roadHalfWidth;
                    this.velocityX = 0;
                }
                if (this.x > roadHalfWidth) {
                    this.x = roadHalfWidth;
                    this.velocityX = 0;
                }

                // Дым при дрифте
                if (this.isDrifting && Math.random() < 0.3) {
                    createSmoke(this.x, this.z);
                }

                const roadOffset = getRoadOffset(this.z);
                this.mesh.position.set(this.x + roadOffset, 0.7, 0);
                this.mesh.rotation.y = this.angle;

                camera.position.x = this.x + roadOffset;
                camera.position.z = 0;

                const lookAheadZ = 20;
                const futureOffset = getRoadOffset(this.z + lookAheadZ);
                const lookAtX = this.x + futureOffset + Math.sin(this.angle) * 5;
                camera.lookAt(lookAtX, 1.5, lookAheadZ);

                score += this.velocity * deltaTime;
                document.getElementById('score').textContent = Math.floor(score);
                const speedPercent = Math.min(100, (this.velocity / this.maxSpeed) * 100);
                document.getElementById('speedBar').style.width = speedPercent + '%';
                document.getElementById('speed').textContent = 'Скорость: ' + Math.floor(this.velocity) + ' км/ч';
                document.getElementById('driftText').textContent = Math.floor(driftTimer * 100);

                // Размытие по краям при высокой скорости
                const blurAmount = Math.max(0, (this.velocity - 100) / 100 * 10);
                document.getElementById('canvas').style.filter = 'blur(' + blurAmount + 'px)';
            }
        }

        // === КЛАСС ВРАГА ===
        class EnemyCar {
            constructor(z, lane, isPolice = false) {
                this.z = z;
                this.x = lane * 4;
                this.velocity = isPolice ? (100 + Math.random() * 50) : (60 + Math.random() * 40); // ПОЛИЦИЯ БЫСТРЕЕ
                this.isPolice = isPolice;
                this.flashTime = 0;
                this.targetLane = lane;
                this.switchTimer = 0;
                this.sirenTimer = 0;

                const carColor = isPolice ? 0xffffff : 0xff6b6b;
                this.mesh = createRealisticCar(carColor, true);

                if (isPolice) {
                    // Большие яркие огни полиции
                    const redGeom = new THREE.BoxGeometry(0.5, 0.4, 0.4);
                    const redMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 });
                    this.redLight = new THREE.Mesh(redGeom, redMat);
                    this.redLight.position.set(-0.4, 1.3, 0.2);
                    this.mesh.add(this.redLight);

                    const blueGeom = new THREE.BoxGeometry(0.5, 0.4, 0.4);
                    const blueMat = new THREE.MeshStandardMaterial({ color: 0x0000ff, emissive: 0x0000ff });
                    this.blueLight = new THREE.Mesh(blueGeom, blueMat);
                    this.blueLight.position.set(0.4, 1.3, 0.2);
                    this.mesh.add(this.blueLight);
                }

                scene.add(this.mesh);
            }

            update(deltaTime) {
                this.z -= this.velocity * deltaTime; // ЕДЯТ К НАМ
                const offset = getRoadOffset(this.z);

                // ПОЛИЦИЯ: умный AI - перехватывает игрока
                if (this.isPolice) {
                    const playerWorldX = playerCar.x + getRoadOffset(playerCar.z);
                    const distX = playerWorldX - (this.x + offset);

                    // Чем ближе к игроку, тем агрессивнее манёвры
                    const aggression = Math.max(0.5, 1 - Math.abs(this.z - playerCar.z) / 100);
                    this.targetLane = Math.round((distX / 5) * aggression);
                    this.targetLane = Math.max(-1, Math.min(1, this.targetLane));

                    this.sirenTimer += deltaTime;
                    if (this.sirenTimer > 1.2) {
                        playSirenSound();
                        this.sirenTimer = 0;
                    }
                } else {
                    // Обычные машины: меняют полосы случайно
                    this.switchTimer++;
                    if (this.switchTimer > 120) {
                        const newLane = Math.floor(Math.random() * 3) - 1;
                        if (newLane !== this.targetLane) {
                            this.targetLane = newLane;
                        }
                        this.switchTimer = 0;
                    }
                }

                // Плавно движутся к целевой полосе
                if (Math.abs(this.x - this.targetLane * 4) > 0.2) {
                    const moveSpeed = this.isPolice ? 0.05 : 0.02;
                    this.x += (this.targetLane * 4 - this.x) * moveSpeed;
                } else {
                    this.x = this.targetLane * 4;
                }

                this.mesh.position.set(this.x + offset, 0.7, this.z);

                if (this.isPolice) {
                    this.flashTime += deltaTime;
                    const flash1 = Math.sin(this.flashTime * 8) > 0.3;
                    const flash2 = Math.sin(this.flashTime * 8 + Math.PI) > 0.3;
                    this.redLight.material.emissive.setHex(flash1 ? 0xff0000 : 0x660000);
                    this.redLight.visible = flash1;
                    this.blueLight.material.emissive.setHex(flash2 ? 0x0000ff : 0x000066);
                    this.blueLight.visible = flash2;
                }
            }

            isOffScreen() {
                return this.z < -50; // Враги исчезают когда уходят впереди (z < -50)
            }

            getWorldX() {
                return this.x + getRoadOffset(this.z);
            }
        }

        // === ДЫМ ===
        function createSmoke(x, z) {
            const smokeGeom = new THREE.SphereGeometry(0.3, 8, 8);
            const smokeMat = new THREE.MeshStandardMaterial({
                color: 0x888888,
                transparent: true,
                opacity: 0.5
            });
            const smoke = new THREE.Mesh(smokeGeom, smokeMat);
            smoke.position.set(x + (Math.random() - 0.5) * 2, 0.5 + Math.random() * 1, (Math.random() - 0.5) * 2);
            scene.add(smoke);
            smokeParticles.push({
                mesh: smoke,
                life: 1,
                maxLife: 1
            });
        }

        // === СОЗДАНИЕ ДОРОГИ ===
        let grassSegments = [];
        function createRoad() {
            for (let i = 0; i < 20; i++) { // 20 сегментов - видна дорога ДАЛЕКО на горизонт
                createRoadSegment(i * -50);
            }
        }

        // === ТРАВА ПО КРАЯМ ДОРОГИ ===
        function createGrassSegment(z) {
            const segmentLength = 50;
            const roadWidth = 20;
            const grassWidth = 15;

            // ЛЕВАЯ трава
            const grassLeftGeom = new THREE.PlaneGeometry(grassWidth, segmentLength);
            const grassMat = new THREE.MeshStandardMaterial({
                color: 0x2d5016, // Тёмно-зелёный
                roughness: 0.8
            });
            const grassLeft = new THREE.Mesh(grassLeftGeom, grassMat);
            grassLeft.rotation.x = -Math.PI / 2;
            const offset = getRoadOffset(z);
            grassLeft.position.set(-roadWidth / 2 - grassWidth / 2 + offset, -0.01, z);
            grassLeft.receiveShadow = true;
            scene.add(grassLeft);

            // ПРАВАЯ трава
            const grassRight = new THREE.Mesh(grassLeftGeom, grassMat);
            grassRight.rotation.x = -Math.PI / 2;
            grassRight.position.set(roadWidth / 2 + grassWidth / 2 + offset, -0.01, z);
            grassRight.receiveShadow = true;
            scene.add(grassRight);

            grassSegments.push({ left: grassLeft, right: grassRight, z: z });
        }

        function createRoadSegment(z) {
            const roadWidth = 20;
            const segmentLength = 50;

            // Асфальт с текстурой
            const asphaltGeom = new THREE.PlaneGeometry(roadWidth, segmentLength);
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#8B6F47'; // Коричневая дорога (земляной асфальт)
            ctx.fillRect(0, 0, 512, 512);
            // Зашумление для текстуры дороги
            for (let i = 0; i < 150; i++) {
                ctx.fillStyle = `rgba(100,80,50,${Math.random() * 0.2})`;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, Math.random() * 15, Math.random() * 15);
            }
            const asphaltTexture = new THREE.CanvasTexture(canvas);
            asphaltTexture.repeat.set(4, 2);
            asphaltTexture.wrapS = THREE.RepeatWrapping;
            asphaltTexture.wrapT = THREE.RepeatWrapping;
            const asphaltMat = new THREE.MeshStandardMaterial({
                map: asphaltTexture,
                roughness: 0.9
            });
            const roadMesh = new THREE.Mesh(asphaltGeom, asphaltMat);
            roadMesh.rotation.x = -Math.PI / 2;
            const offset = getRoadOffset(z);
            roadMesh.position.set(offset, 0, z);
            roadMesh.receiveShadow = true;
            scene.add(roadMesh);

            // БЕЛАЯ ПУНКТИРНАЯ разметка в центре
            for (let i = 0; i < segmentLength / 5; i++) {
                const dashGeometry = new THREE.PlaneGeometry(0.4, 2);
                const dashMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const dash = new THREE.Mesh(dashGeometry, dashMat);
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(offset, 0.01, z + i * 5 - segmentLength / 2);
                scene.add(dash);
            }

            // БЕЛЫЕ границы дороги (слева)
            const leftLineGeom = new THREE.PlaneGeometry(0.3, segmentLength);
            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const leftLine = new THREE.Mesh(leftLineGeom, whiteMat);
            leftLine.rotation.x = -Math.PI / 2;
            leftLine.position.set(-roadWidth / 2 + offset, 0.02, z);
            scene.add(leftLine);

            // БЕЛЫЕ границы дороги (справа)
            const rightLine = new THREE.Mesh(leftLineGeom, whiteMat);
            rightLine.rotation.x = -Math.PI / 2;
            rightLine.position.set(roadWidth / 2 + offset, 0.02, z);
            scene.add(rightLine);

            // Бордюры (розовые)
            const borderGeom = new THREE.BoxGeometry(0.5, 0.8, segmentLength);
            const borderMat = new THREE.MeshStandardMaterial({ color: 0xff00ff });
            const leftBorder = new THREE.Mesh(borderGeom, borderMat);
            leftBorder.position.set(-roadWidth / 2 - 0.25 + offset, 0.4, z);
            leftBorder.castShadow = true;
            scene.add(leftBorder);

            const rightBorder = new THREE.Mesh(borderGeom, borderMat);
            rightBorder.position.set(roadWidth / 2 + 0.25 + offset, 0.4, z);
            rightBorder.castShadow = true;
            scene.add(rightBorder);

            roadSegments.push({ mesh: roadMesh, z: z });
        }

        // === ОБНОВЛЕНИЕ ДОРОГИ И ВРАГОВ ===
        function updateRoad(deltaTime) {
            roadSegments.forEach(segment => {
                if (segment.z > 50) scene.remove(segment.mesh);
            });
            roadSegments = roadSegments.filter(s => s.z <= 50);

            grassSegments.forEach(segment => {
                if (segment.z > 50) {
                    scene.remove(segment.left);
                    scene.remove(segment.right);
                }
            });
            grassSegments = grassSegments.filter(s => s.z <= 50);

            if (roadSegments.length < 20) { // Поддерживаем 20 сегментов для длинной дороги
                const lastZ = roadSegments[roadSegments.length - 1]?.z || 0;
                createRoadSegment(lastZ - 50);
                createGrassSegment(lastZ - 50);
            }

            spawnCounter++;
            if (spawnCounter > 180) {
                const lane = Math.floor(Math.random() * 3) - 1;
                const isPolice = Math.random() < 0.25;
                enemies.push(new EnemyCar(150, lane, isPolice)); // ПОЗАДИ НАС
                spawnCounter = 0;
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update(deltaTime);

                const enemyWorldX = enemies[i].getWorldX();
                const playerWorldX = playerCar.x + getRoadOffset(playerCar.z);
                const dx = Math.abs(enemyWorldX - playerWorldX);
                const dz = Math.abs(enemies[i].z - playerCar.z);

                if (dx < 2 && dz < 3) {
                    playCollisionSound();
                    gameState = 'gameOver';
                }

                if (enemies[i].isOffScreen()) {
                    scene.remove(enemies[i].mesh);
                    enemies.splice(i, 1);
                }
            }

            // Обновляем дым
            for (let i = smokeParticles.length - 1; i >= 0; i--) {
                smokeParticles[i].life -= deltaTime;
                smokeParticles[i].mesh.material.opacity = (smokeParticles[i].life / smokeParticles[i].maxLife) * 0.5;
                smokeParticles[i].mesh.position.y += deltaTime * 1;
                if (smokeParticles[i].life <= 0) {
                    scene.remove(smokeParticles[i].mesh);
                    smokeParticles.splice(i, 1);
                }
            }
        }

        // === INPUT ===
        function setupInput() {
            window.addEventListener('keydown', (e) => inputHandler[e.key] = true);
            window.addEventListener('keyup', (e) => inputHandler[e.key] = false);
        }

        // === КАМЕРА ДЛЯ ЗЕРКАЛА ===
        let mirrorCamera = null;
        let mirrorCanvas = null;

        function initMirrorCamera() {
            mirrorCanvas = document.getElementById('mirrorCanvas');
            mirrorCamera = new THREE.PerspectiveCamera(
                75,
                mirrorCanvas.width / mirrorCanvas.height,
                0.1,
                5000
            );
        }

        // === РЕНДЕРИНГ ЗЕРКАЛА ===
        function renderMirror() {
            if (!mirrorCamera || !mirrorCanvas) return;

            const mirrorRenderer = new THREE.WebGLRenderer({
                canvas: mirrorCanvas,
                antialias: false,
                alpha: true
            });
            mirrorRenderer.setSize(150, 100);

            // Камера смотрит назад (на 180 градусов)
            const roadOffset = getRoadOffset(playerCar.z);
            mirrorCamera.position.x = playerCar.x + roadOffset;
            mirrorCamera.position.y = 1.5;
            mirrorCamera.position.z = 0;

            // Смотрит назад
            mirrorCamera.lookAt(
                playerCar.x + roadOffset,
                1.5,
                50 // Смотрит позади
            );

            mirrorRenderer.render(scene, mirrorCamera);
        }

        // === РИСОВАНИЕ РУЛЯ ===
        function drawSteeringWheel(angle) {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const radius = 50;
            const centerX = radius;
            const centerY = radius;

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(centerX, centerY);

            // Руль поворачивается до 90 градусов в зависимости от угла машины
            const wheelRotation = Math.max(-90, Math.min(90, angle * 2)); // Макс 90 градусов
            ctx.rotate(wheelRotation * Math.PI / 180);

            // Круг руля
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(0, 0, radius - 5, 0, Math.PI * 2);
            ctx.stroke();

            // Спицы руля (12 спиц)
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) {
                const a = (Math.PI * 2 / 12) * i;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(a) * (radius - 10), Math.sin(a) * (radius - 10));
                ctx.stroke();
            }

            ctx.restore();

            // Центр (не вращается)
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fill();

            // Текст "Wheel"
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('WHEEL', centerX, centerY + radius + 15);
        }

        // === GAME LOOP ===
        let lastTime = Date.now();
        function gameLoop() {
            const now = Date.now();
            const deltaTime = (now - lastTime) / 1000;
            lastTime = now;

            if (gameState === 'playing') {
                playerCar.update(deltaTime);
                updateRoad(deltaTime);
                drawSteeringWheel(playerCar.angle);
                renderMirror();
            } else if (gameState === 'gameOver') {
                stopEngineSound();
                document.getElementById('hud').style.display = 'none';
                document.getElementById('finalScore').textContent = Math.floor(score);
                document.getElementById('gameOverScreen').style.display = 'flex';
            }

            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        // === ВЫБОР МАШИН ===
        function showCarSelect() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('carSelectScreen').style.display = 'flex';
            renderCarModels();
        }

        function showMenu() {
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('carSelectScreen').style.display = 'none';
        }

        function renderCarModels() {
            const container = document.getElementById('carModels');
            container.innerHTML = '';

            Object.entries(CAR_MODELS).forEach(([modelKey, modelData]) => {
                const carDiv = document.createElement('div');
                carDiv.className = `car-model ${modelKey === selectedCarModel ? 'selected' : ''}`;
                carDiv.onclick = () => selectModel(modelKey);

                let colorHTML = '<div class="color-options">';
                modelData.colors.forEach((color, idx) => {
                    const colorHex = '#' + color.toString(16).padStart(6, '0');
                    const isSelected = selectedCarModel === modelKey && selectedCarColor === color;
                    colorHTML += `<div class="color-btn ${isSelected ? 'selected' : ''}" style="background: ${colorHex};" onclick="event.stopPropagation(); selectColor('${modelKey}', ${color})"></div>`;
                });
                colorHTML += '</div>';

                carDiv.innerHTML = `<h2>${modelData.name}</h2><p>${modelKey.toUpperCase()}</p>${colorHTML}`;
                container.appendChild(carDiv);
            });

            updateStartButton();
        }

        function selectModel(model) {
            selectedCarModel = model;
            selectedCarColor = CAR_MODELS[model].colors[0];
            renderCarModels();
        }

        function selectColor(model, color) {
            selectedCarModel = model;
            selectedCarColor = color;
            renderCarModels();
        }

        function updateStartButton() {
            const btn = document.getElementById('startBtn');
            btn.disabled = false;
        }

        function saveCarSelection() {
            localStorage.setItem('selectedCarModel', selectedCarModel);
            localStorage.setItem('selectedCarColor', selectedCarColor);
        }

        function loadCarSelection() {
            const saved = localStorage.getItem('selectedCarModel');
            const savedColor = localStorage.getItem('selectedCarColor');
            if (saved && CAR_MODELS[saved]) {
                selectedCarModel = saved;
                selectedCarColor = parseInt(savedColor) || CAR_MODELS[saved].colors[0];
            }
        }

        // === ЗАПУСК ИГРЫ ===
        function startGameWithCar() {
            saveCarSelection();
            document.getElementById('carSelectScreen').style.display = 'none';
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('wheelCanvas').style.display = 'block';
            document.getElementById('mirror').style.display = 'block';
            initMirrorCamera();
            initAudio();
            gameState = 'playing';
            score = 0;
            playerCar.velocity = 0;
        }

        window.addEventListener('load', () => {
            loadCarSelection();
            initThreeJS();
            createRoad();
            for (let i = 0; i < 20; i++) {
                createGrassSegment(i * -50);
            }
            playerCar = new PlayerCar();
            setupInput();
            gameLoop();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>
</body>
